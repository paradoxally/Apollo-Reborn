name: Delete draft release

# One-off maintenance helper: deletes a DRAFT release by numeric ID.
# Refuses to touch published releases. Dispatched manually.

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Numeric ID of the DRAFT release to delete'
        required: true
        type: string

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete draft release by id
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ inputs.release_id }}
        run: |
          IS_DRAFT=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" --jq .draft)
          if [ "$IS_DRAFT" != "true" ]; then
            echo "Release ${RELEASE_ID} is not a draft; refusing to delete." >&2
            exit 1
          fi
          gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
          echo "Deleted draft release ${RELEASE_ID}."
