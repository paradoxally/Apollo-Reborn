<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="659" viewBox="0 365 1024 659">
<defs>
  <radialGradient id="floor" cx="50%" cy="55%" r="78%">
    <stop offset="0" stop-color="#351052"/>
    <stop offset=".55" stop-color="#220837"/>
    <stop offset="1" stop-color="#11041d"/>
  </radialGradient>

  <linearGradient id="bloom" x1="0" y1="365" x2="0" y2="545" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#ff19d8" stop-opacity="0"/>
    <stop offset=".42" stop-color="#ff19d8" stop-opacity=".52"/>
    <stop offset=".58" stop-color="#ff19d8" stop-opacity=".28"/>
    <stop offset="1" stop-color="#ff19d8" stop-opacity="0"/>
  </linearGradient>

  <filter id="hGlow" x="-50%" y="-700%" width="200%" height="1500%">
    <feGaussianBlur stdDeviation="28" result="b1"/>
    <feGaussianBlur stdDeviation="9" result="b2"/>
    <feMerge>
      <feMergeNode in="b1"/>
      <feMergeNode in="b2"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <filter id="gGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="6" result="b1"/>
    <feGaussianBlur stdDeviation="2" result="b2"/>
    <feMerge>
      <feMergeNode in="b1"/>
      <feMergeNode in="b2"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- dark grid/floor only, no upper sky background -->
<rect y="445" width="1024" height="579" fill="url(#floor)"/>

<!-- top pink hue begins at the very top of this cropped SVG -->
<rect x="-80" y="365" width="1184" height="180" fill="url(#bloom)" opacity=".92"/>

<!-- neon horizon -->
<line x1="-80" y1="448" x2="1104" y2="448" stroke="#ff00d8" stroke-width="22" filter="url(#hGlow)"/>
<line x1="-80" y1="448" x2="1104" y2="448" stroke="#ff28e1" stroke-width="10"/>
<line x1="-80" y1="448" x2="1104" y2="448" stroke="#ff9af2" stroke-width="3" opacity=".85"/>

<!-- deep perspective grid -->
<g fill="none" stroke="#ff28df" stroke-linecap="round" filter="url(#gGlow)">
  <path d="M-8 466H1032" stroke-width="3"/>
  <path d="M-16 486H1040" stroke-width="3"/>
  <path d="M-28 510H1052" stroke-width="3"/>
