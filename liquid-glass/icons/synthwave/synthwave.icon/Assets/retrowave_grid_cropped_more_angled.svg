  <path d="M-62 574H1086" stroke-width="3.5"/>
  <path d="M-90 617H1114" stroke-width="4"/>
  <path d="M-130 671H1154" stroke-width="4.5"/>
  <path d="M-185 740H1209" stroke-width="5"/>
  <path d="M-265 829H1289" stroke-width="6"/>
  <path d="M-380 946H1404" stroke-width="8"/>

  <path d="M512 448L512 1100" stroke-width="5"/>
  <path d="M440 448L245 1100" stroke-width="5"/>
  <path d="M584 448L779 1100" stroke-width="5"/>
  <path d="M368 448L-55 1100" stroke-width="5"/>
